<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Курс английского · A1</title>

<!-- ============================================================
     Registration shim. Defined BEFORE the week files load so that
     each weekNN.js / dictionary.js can call these the moment it runs.
     Works from file:// with zero setup.
     ============================================================ -->
<script>
  window.EC = { weeks: [], extraWords: [] };
  function registerWeek(w){ if (w && typeof w === "object") window.EC.weeks.push(w); }
  function registerWords(list){ if (Array.isArray(list)) window.EC.extraWords.push.apply(window.EC.extraWords, list); }
</script>

<style>
:root{
  --paper:#f3f1ea;        /* page background */
  --surface:#ffffff;      /* cards */
  --surface-2:#faf8f3;    /* recessed panels */
  --ink:#22262f;          /* primary text */
  --ink-soft:#5d6470;     /* secondary text */
  --ink-faint:#8b919c;    /* captions */
  --line:#e3dfd4;         /* hairlines */
  --teal:#0d7d72;         /* primary action / brand */
  --teal-deep:#0a5d55;
  --teal-wash:#e3f1ef;
  --amber:#d9851a;        /* accent: streaks, highlights */
  --amber-wash:#fbeed6;
  --ok:#1f9d57;
  --ok-wash:#e4f4ea;
  --bad:#cf4434;
  --bad-wash:#f8e6e3;
  --shadow:0 1px 2px rgba(31,36,46,.05), 0 8px 24px -16px rgba(31,36,46,.25);
  --radius:14px;
  --radius-s:10px;
  --fs:16px;              /* user-scalable base */
  --sans:system-ui,-apple-system,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
  --mono:ui-monospace,"SF Mono",Menlo,Consolas,"Liberation Mono",monospace;
}
[data-theme="dark"]{
  --paper:#15181e;
  --surface:#1d2128;
  --surface-2:#20252d;
  --ink:#e9eaed;
  --ink-soft:#aab0bb;
  --ink-faint:#7c8492;
  --line:#2c323b;
  --teal:#3fb9ab;
  --teal-deep:#2f9488;
  --teal-wash:#15302d;
  --amber:#e9a544;
  --amber-wash:#3a2c12;
  --ok:#46c07f;
  --ok-wash:#173024;
  --bad:#e8675a;
  --bad-wash:#36211e;
  --shadow:0 1px 2px rgba(0,0,0,.3), 0 10px 30px -18px rgba(0,0,0,.7);
}

*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  background:var(--paper);
  color:var(--ink);
  font-family:var(--sans);
  font-size:var(--fs);
  line-height:1.55;
  -webkit-text-size-adjust:100%;
  text-rendering:optimizeLegibility;
}
button{font-family:inherit;font-size:inherit;color:inherit;cursor:pointer}
input,select{font-family:inherit;font-size:inherit}
a{color:var(--teal)}

/* ---------- layout shell ---------- */
.app{display:grid;grid-template-columns:268px 1fr;min-height:100vh}
.sidebar{
  border-right:1px solid var(--line);
  background:var(--surface);
  position:sticky;top:0;align-self:start;height:100vh;overflow-y:auto;
  display:flex;flex-direction:column;
}
.main{min-width:0;display:flex;flex-direction:column}

/* ---------- brand ---------- */
.brand{padding:20px 20px 14px;border-bottom:1px solid var(--line)}
.brand .kicker{
  font-size:.66rem;letter-spacing:.18em;text-transform:uppercase;
  color:var(--amber);font-weight:700;
}
.brand h1{margin:.2em 0 0;font-size:1.18rem;font-weight:760;letter-spacing:-.01em}
.brand .sub{margin-top:2px;color:var(--ink-faint);font-size:.78rem}

/* ---------- week / day nav ---------- */
.nav{padding:8px 10px 24px;flex:1}
.nav-section-title{
  font-size:.64rem;letter-spacing:.16em;text-transform:uppercase;
  color:var(--ink-faint);font-weight:700;padding:14px 10px 6px;
}
.week-btn{
  width:100%;text-align:left;border:0;background:transparent;
  padding:9px 10px;border-radius:var(--radius-s);
  display:flex;align-items:center;gap:10px;color:var(--ink);
}
.week-btn:hover{background:var(--surface-2)}
.week-btn[aria-expanded="true"]{background:var(--surface-2)}
.week-no{
  flex:none;width:26px;height:26px;border-radius:8px;
  display:grid;place-items:center;font-size:.78rem;font-weight:700;
  background:var(--teal-wash);color:var(--teal-deep);
}
.week-name{font-size:.9rem;font-weight:600;line-height:1.25;flex:1;min-width:0}
.week-name small{display:block;font-weight:400;color:var(--ink-faint);font-size:.72rem;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chev{color:var(--ink-faint);transition:transform .18s ease;flex:none}
.week-btn[aria-expanded="true"] .chev{transform:rotate(90deg)}
.days{display:none;padding:2px 0 8px 12px;margin-left:22px;border-left:1px solid var(--line)}
.days.open{display:block}
.day-btn{
  width:100%;text-align:left;border:0;background:transparent;color:var(--ink-soft);
  padding:6px 10px;border-radius:8px;font-size:.85rem;display:flex;align-items:center;gap:8px;
}
.day-btn:hover{background:var(--surface-2);color:var(--ink)}
.day-btn.active{background:var(--teal);color:#fff;font-weight:600}
.day-btn.active .dot{background:#fff}
.day-btn .dot{width:6px;height:6px;border-radius:50%;background:var(--line);flex:none}
.day-btn.done .dot{background:var(--ok)}
.nav-link{
  width:100%;text-align:left;border:0;background:transparent;color:var(--ink);
  padding:9px 10px;border-radius:var(--radius-s);display:flex;gap:10px;align-items:center;font-size:.9rem;font-weight:560;
}
.nav-link:hover{background:var(--surface-2)}
.nav-ico{width:20px;text-align:center;flex:none;color:var(--ink-faint)}

/* ---------- topbar ---------- */
.topbar{
  position:sticky;top:0;z-index:20;background:color-mix(in srgb,var(--paper) 86%, transparent);
  backdrop-filter:saturate(1.4) blur(8px);
  border-bottom:1px solid var(--line);
  display:flex;align-items:center;gap:10px;padding:10px 22px;
}
.crumbs{font-size:.82rem;color:var(--ink-soft);flex:1;min-width:0;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.crumbs b{color:var(--ink)}
.tool{
  border:1px solid var(--line);background:var(--surface);color:var(--ink-soft);
  width:38px;height:38px;border-radius:10px;display:grid;place-items:center;flex:none;
}
.tool:hover{color:var(--ink);border-color:var(--teal);}
.tool.wide{width:auto;padding:0 12px;gap:6px;font-size:.82rem;font-weight:600}
.menu-btn{display:none}

/* ---------- content ---------- */
.content{padding:26px 22px 90px;max-width:880px;width:100%;margin:0 auto}
.page-head{margin-bottom:18px}
.eyebrow{font-size:.68rem;letter-spacing:.16em;text-transform:uppercase;color:var(--amber);font-weight:700}
.page-head h2{margin:.25em 0 .1em;font-size:1.7rem;font-weight:780;letter-spacing:-.02em;line-height:1.1}
.page-head p{margin:0;color:var(--ink-soft)}

/* subtabs */
.subtabs{display:flex;gap:4px;flex-wrap:wrap;margin:18px 0 22px;
  background:var(--surface-2);padding:5px;border-radius:12px;border:1px solid var(--line)}
.subtab{border:0;background:transparent;color:var(--ink-soft);padding:8px 13px;border-radius:9px;
  font-size:.85rem;font-weight:600}
.subtab:hover{color:var(--ink)}
.subtab.active{background:var(--surface);color:var(--ink);box-shadow:var(--shadow)}

/* cards */
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
  padding:20px 22px;box-shadow:var(--shadow);margin-bottom:18px}
.card h3{margin:0 0 12px;font-size:1.05rem;font-weight:720;display:flex;align-items:center;gap:9px}
.card h3 .tag{font-size:.62rem;letter-spacing:.12em;text-transform:uppercase;font-weight:700;
  color:var(--teal-deep);background:var(--teal-wash);padding:3px 8px;border-radius:999px}

.grammar{font-size:1.02rem;line-height:1.7}
.grammar b{color:var(--teal-deep)}
[data-theme="dark"] .grammar b{color:var(--teal)}

/* examples */
.ex-row{display:flex;align-items:flex-start;gap:12px;padding:11px 0;border-top:1px solid var(--line)}
.ex-row:first-child{border-top:0}
.ex-en{font-weight:620}
.ex-ru{color:var(--ink-soft);font-size:.92em}
.speak{flex:none;border:1px solid var(--line);background:var(--surface-2);border-radius:9px;
  width:34px;height:34px;display:grid;place-items:center;color:var(--teal)}
.speak:hover{background:var(--teal);color:#fff;border-color:var(--teal)}
.speak:active{transform:scale(.94)}

/* clickable words */
.w{cursor:pointer;border-radius:3px;padding:0 1px}
.w:hover{background:var(--amber-wash);box-shadow:0 0 0 1px var(--amber) inset}

/* vocab list */
.vocab-tools{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;align-items:center}
.btn{border:1px solid var(--line);background:var(--surface);color:var(--ink);
  padding:9px 14px;border-radius:10px;font-weight:600;font-size:.86rem;display:inline-flex;gap:7px;align-items:center}
.btn:hover{border-color:var(--teal);color:var(--teal-deep)}
.btn.primary{background:var(--teal);border-color:var(--teal);color:#fff}
.btn.primary:hover{background:var(--teal-deep)}
.btn.ghost{background:transparent}
.btn:disabled{opacity:.5;cursor:default}

.vlist{display:grid;gap:1px;background:var(--line);border:1px solid var(--line);border-radius:12px;overflow:hidden}
.vrow{background:var(--surface);display:grid;grid-template-columns:1fr auto;gap:8px 14px;padding:12px 14px;align-items:center}
.vrow .l{min-width:0}
.ven{font-weight:700;font-size:1.02rem;display:inline-flex;align-items:center;gap:8px}
.vpos{font-size:.64rem;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-faint);
  border:1px solid var(--line);border-radius:6px;padding:1px 6px;font-weight:600}
.vpron{font-family:var(--mono);color:var(--teal-deep);font-size:.86rem}
[data-theme="dark"] .vpron{color:var(--teal)}
.vipa{font-family:var(--mono);color:var(--ink-faint);font-size:.82rem;display:none}
.show-ipa .vipa{display:inline}
.vtrans{color:var(--ink-soft);font-size:.92rem;margin-top:2px}
.vtrans .uz{color:var(--ink-faint)}
.vex{color:var(--ink-faint);font-size:.85rem;margin-top:3px;font-style:italic}
.vrow .r{display:flex;gap:6px;align-items:center}
.mark{border:1px solid var(--line);background:transparent;border-radius:8px;width:34px;height:34px;
  display:grid;place-items:center;color:var(--ink-faint);font-size:.95rem}
.mark.known.on{background:var(--ok-wash);border-color:var(--ok);color:var(--ok)}
.mark.learning.on{background:var(--amber-wash);border-color:var(--amber);color:var(--amber)}

/* exercises */
.exq{margin-bottom:16px;padding-bottom:16px;border-bottom:1px solid var(--line)}
.exq:last-child{border-bottom:0;margin-bottom:0;padding-bottom:0}
.exq .prompt{font-weight:600;margin-bottom:9px}
.exq .prompt .n{color:var(--ink-faint);font-weight:700;margin-right:8px}
.opts{display:flex;flex-wrap:wrap;gap:8px}
.opt{border:1px solid var(--line);background:var(--surface-2);border-radius:9px;padding:8px 14px;font-weight:600}
.opt:hover{border-color:var(--teal)}
.opt.sel{border-color:var(--teal);background:var(--teal-wash);color:var(--teal-deep)}
.opt.right{border-color:var(--ok);background:var(--ok-wash);color:var(--ok)}
.opt.wrong{border-color:var(--bad);background:var(--bad-wash);color:var(--bad)}
.inp{border:1px solid var(--line);background:var(--surface-2);border-radius:9px;padding:9px 12px;
  width:100%;max-width:340px;color:var(--ink)}
.inp:focus{outline:2px solid var(--teal);outline-offset:1px;border-color:var(--teal)}
.inp.right{border-color:var(--ok);background:var(--ok-wash)}
.inp.wrong{border-color:var(--bad);background:var(--bad-wash)}
.chips{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:8px}
.chip{border:1px solid var(--line);background:var(--surface-2);border-radius:8px;padding:6px 12px;font-weight:600}
.chip:hover{border-color:var(--teal)}
.chip.used{opacity:.35;pointer-events:none}
.answer-build{min-height:42px;border:1px dashed var(--line);border-radius:9px;padding:8px 10px;
  display:flex;flex-wrap:wrap;gap:7px;align-items:center;margin-bottom:8px;background:var(--surface-2)}
.answer-build .placeholder{color:var(--ink-faint);font-size:.86rem}
.answer-build .chip{cursor:pointer}
.match-grid{display:grid;gap:8px}
.match-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;align-items:center}
.match-row .en{font-weight:640}
.match-row select{border:1px solid var(--line);background:var(--surface-2);border-radius:8px;padding:8px;color:var(--ink);width:100%}
.match-row.right select{border-color:var(--ok);background:var(--ok-wash)}
.match-row.wrong select{border-color:var(--bad);background:var(--bad-wash)}
.feedback{margin-top:6px;font-size:.86rem;font-weight:600}
.feedback.ok{color:var(--ok)}
.feedback.bad{color:var(--bad)}

/* homework */
.hw-item{padding:14px 0;border-bottom:1px solid var(--line)}
.hw-item:last-child{border-bottom:0}
.hw-q{font-weight:600;margin-bottom:8px}
.hw-a{display:none;margin-top:8px;background:var(--ok-wash);border:1px solid var(--ok);
  color:var(--ok);border-radius:9px;padding:8px 12px;font-weight:600}
.reveal .hw-a{display:block}

/* flashcards */
.fc-stage{display:flex;flex-direction:column;align-items:center;gap:18px}
.fc-count{color:var(--ink-faint);font-size:.84rem;font-weight:600}
.flash{width:100%;max-width:440px;height:240px;perspective:1400px;cursor:pointer}
.flash-inner{position:relative;width:100%;height:100%;transition:transform .5s cubic-bezier(.2,.7,.2,1);
  transform-style:preserve-3d}
.flash.flipped .flash-inner{transform:rotateY(180deg)}
.face{position:absolute;inset:0;backface-visibility:hidden;border-radius:18px;border:1px solid var(--line);
  background:var(--surface);box-shadow:var(--shadow);display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:8px;padding:24px;text-align:center}
.face.back{transform:rotateY(180deg);background:var(--surface-2)}
.face .big{font-size:2rem;font-weight:800;letter-spacing:-.01em}
.face .pron{font-family:var(--mono);color:var(--teal-deep);font-size:1rem}
[data-theme="dark"] .face .pron{color:var(--teal)}
.face .ru{font-size:1.5rem;font-weight:700}
.face .uz{color:var(--ink-soft)}
.face .hint{position:absolute;bottom:12px;font-size:.72rem;color:var(--ink-faint)}
.fc-controls{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}

/* quiz / dictation shared */
.run{max-width:520px;margin:0 auto}
.run .progress{height:6px;background:var(--line);border-radius:99px;overflow:hidden;margin-bottom:20px}
.run .progress > i{display:block;height:100%;background:var(--teal);transition:width .3s ease}
.run .qbox{text-align:center;margin-bottom:18px}
.run .qbox .label{font-size:.72rem;letter-spacing:.12em;text-transform:uppercase;color:var(--amber);font-weight:700}
.run .qbox .term{font-size:1.9rem;font-weight:800;margin:6px 0 2px}
.result{text-align:center;padding:8px 0}
.result .score{font-size:3rem;font-weight:850;color:var(--teal)}

/* dashboard */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin-bottom:20px}
.stat{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:16px 18px;box-shadow:var(--shadow)}
.stat .num{font-size:2.1rem;font-weight:840;letter-spacing:-.02em;line-height:1}
.stat .num.teal{color:var(--teal)}
.stat .num.amber{color:var(--amber)}
.stat .lab{color:var(--ink-soft);font-size:.82rem;margin-top:4px}
.bar{height:9px;border-radius:99px;background:var(--line);overflow:hidden;margin-top:10px}
.bar > i{display:block;height:100%;background:linear-gradient(90deg,var(--teal),var(--amber))}

.empty{text-align:center;color:var(--ink-faint);padding:40px 16px}
.empty .big{font-size:2.4rem;margin-bottom:6px}

/* overlay (search / translate) */
.overlay{position:fixed;inset:0;z-index:60;display:none;align-items:flex-start;justify-content:center;
  background:rgba(15,18,24,.45);padding:80px 16px}
.overlay.open{display:flex}
.sheet{background:var(--surface);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);
  width:100%;max-width:560px;max-height:75vh;overflow:hidden;display:flex;flex-direction:column}
.sheet header{padding:14px 16px;border-bottom:1px solid var(--line);display:flex;gap:10px;align-items:center}
.sheet header input{flex:1;border:0;background:transparent;font-size:1.05rem;color:var(--ink)}
.sheet header input:focus{outline:0}
.sheet .results{overflow-y:auto;padding:6px}
.res{display:grid;grid-template-columns:1fr auto;gap:6px 12px;padding:10px 12px;border-radius:10px;align-items:center}
.res:hover{background:var(--surface-2)}
.res .en{font-weight:700}
.res .meta{color:var(--ink-faint);font-size:.76rem}
.res .tr{color:var(--ink-soft);font-size:.9rem;text-align:right}

/* translate popup */
.pop{position:absolute;z-index:80;background:var(--surface);border:1px solid var(--line);
  border-radius:12px;box-shadow:var(--shadow);padding:12px 14px;min-width:170px;max-width:240px;display:none}
.pop.open{display:block}
.pop .pen{font-weight:800;font-size:1.05rem;display:flex;align-items:center;gap:8px}
.pop .ppron{font-family:var(--mono);color:var(--teal-deep);font-size:.82rem;margin-top:2px}
[data-theme="dark"] .pop .ppron{color:var(--teal)}
.pop .pru{margin-top:6px;font-weight:600}
.pop .puz{color:var(--ink-soft);font-size:.9rem}
.pop .miss{color:var(--ink-faint);font-size:.86rem}

/* toast */
.toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);
  background:var(--ink);color:var(--paper);padding:10px 18px;border-radius:999px;font-weight:600;
  font-size:.86rem;opacity:0;transition:.25s;z-index:90;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* responsive */
@media (max-width:860px){
  .app{grid-template-columns:1fr}
  .sidebar{position:fixed;left:0;top:0;width:280px;z-index:50;transform:translateX(-100%);
    transition:transform .25s ease;box-shadow:var(--shadow)}
  .sidebar.open{transform:translateX(0)}
  .menu-btn{display:grid}
  .scrim{position:fixed;inset:0;background:rgba(15,18,24,.4);z-index:40;display:none}
  .scrim.open{display:block}
}
@media print{
  .sidebar,.topbar,.subtabs,.vocab-tools,.speak,.mark,.menu-btn,.no-print{display:none !important}
  .app{display:block}
  .card{break-inside:avoid;box-shadow:none;border-color:#ccc}
  body{background:#fff}
  .reveal .hw-a{display:block}
}
@media (prefers-reduced-motion:reduce){*{transition:none !important}}
:focus-visible{outline:2px solid var(--teal);outline-offset:2px}
</style>
</head>
<body>

<div class="scrim" id="scrim"></div>

<div class="app">
  <!-- ===================== SIDEBAR ===================== -->
  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <div class="kicker">English · A1</div>
      <h1>Курс английского</h1>
      <div class="sub">11 недель · с нуля до Elementary</div>
    </div>
    <nav class="nav">
      <button class="nav-link" data-go="home"><span class="nav-ico">⌂</span> Главная</button>
      <button class="nav-link" data-go="review"><span class="nav-ico">↻</span> Повторение</button>
      <div class="nav-section-title">Недели</div>
      <div id="weekNav"></div>
    </nav>
  </aside>

  <!-- ===================== MAIN ===================== -->
  <div class="main">
    <header class="topbar">
      <button class="tool menu-btn" id="menuBtn" title="Меню">☰</button>
      <div class="crumbs" id="crumbs">Главная</div>
      <button class="tool wide" id="searchBtn" title="Поиск слова">🔍 <span class="no-print">Поиск</span></button>
      <button class="tool" id="ipaBtn" title="Показать/скрыть IPA">ɪ</button>
      <button class="tool" id="fontDown" title="Меньше шрифт">A−</button>
      <button class="tool" id="fontUp" title="Больше шрифт">A+</button>
      <button class="tool" id="themeBtn" title="Тёмная тема">◐</button>
      <button class="tool" id="printBtn" title="Печать">⎙</button>
    </header>

    <main class="content" id="view"><!-- rendered by engine.js --></main>
  </div>
</div>

<!-- search overlay -->
<div class="overlay" id="searchOverlay">
  <div class="sheet">
    <header>
      <span style="color:var(--ink-faint)">🔍</span>
      <input id="searchInput" placeholder="Найти любое слово курса…" autocomplete="off">
      <button class="tool" id="searchClose" style="width:32px;height:32px">✕</button>
    </header>
    <div class="results" id="searchResults"></div>
  </div>
</div>

<!-- click-to-translate popup -->
<div class="pop" id="pop"></div>
<div class="toast" id="toast"></div>

<!-- ===========================================================
     DATA FILES — pre-wired for weeks 1–11.
     Only files that actually exist will load; the rest are
     ignored silently. To go past 11, add one more line here.
     =========================================================== -->
<script src="dictionary.js"></script>
